name: Daily Commit Minimum 1 (WIB)

on:
  schedule:
    - cron: "02 1 * * *"   # 08:02 WIB
    - cron: "25 3 * * *"   # 10:25 WIB
    - cron: "10 6 * * *"   # 13:10 WIB
    - cron: "40 8 * * *"   # 15:40 WIB
    - cron: "15 11 * * *"  # 18:15 WIB
    - cron: "35 13 * * *"  # 20:35 WIB
    - cron: "05 16 * * *"  # 23:05 WIB
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: master
          fetch-depth: 0

      - name: Configure Git (as hotspoon)
        run: |
          git config user.name "hotspoon"
          git config user.email "fariez18@outlook.com"

      - name: Commit at least once per day, sometimes more
        shell: bash
        run: |
          set -e

          export TZ=Asia/Jakarta

          FILE="heartbeat.md"
          TODAY=$(date +%F)
          NOW=$(date '+%H:%M:%S WIB')
          HOUR=$(date +%H)
          WEEKDAY=$(date +%u)   # 1=Mon ... 7=Sun

          touch "$FILE"

          # Hitung commit hari ini pakai marker khusus
          COUNT=$(git log --since="${TODAY} 00:00:00" --until="${TODAY} 23:59:59" --fixed-strings --grep='[daily-bot]' --oneline | wc -l)
          # Kalau belum ada commit -> wajib commit
          if [ "$COUNT" -eq 0 ]; then
            echo "First commit today is required."
          else
            # Maks 3 commit per hari
            if [ "$COUNT" -ge 3 ]; then
              echo "Reached max commits for today."
              exit 0
            fi

            CHANCE=8

            # Jam produktif
            if [ "$HOUR" -ge 9 ] && [ "$HOUR" -lt 12 ]; then
              CHANCE=18
            elif [ "$HOUR" -ge 12 ] && [ "$HOUR" -lt 18 ]; then
              CHANCE=28
            elif [ "$HOUR" -ge 18 ] && [ "$HOUR" -lt 22 ]; then
              CHANCE=16
            fi

            # Weekend lebih rendah
            if [ "$WEEKDAY" -ge 6 ]; then
              CHANCE=$((CHANCE - 5))
              [ "$CHANCE" -lt 5 ] && CHANCE=5
            fi

            # Commit ke-3 lebih jarang
            if [ "$COUNT" -eq 2 ]; then
              CHANCE=$((CHANCE / 2))
              [ "$CHANCE" -lt 5 ] && CHANCE=5
            fi

            ROLL=$((RANDOM % 100))

            if [ "$ROLL" -ge "$CHANCE" ]; then
              echo "Skip extra commit. Roll=$ROLL Chance=$CHANCE"
              exit 0
            fi

            echo "Extra commit selected. Roll=$ROLL Chance=$CHANCE"
          fi

          NOTES=(
            "checked in"
            "small update"
            "notes refreshed"
            "minor progress"
            "daily touch"
            "quick sync"
            "maintenance note"
          )

          MESSAGES=(
            "chore: daily activity"
            "docs: daily activity log"
            "chore: daily activity update"
            "docs: daily activity note"
          )

          NOTE_INDEX=$((RANDOM % ${#NOTES[@]}))
          MSG_INDEX=$((RANDOM % ${#MESSAGES[@]}))

          echo "- ${TODAY} ${NOW} | ${NOTES[$NOTE_INDEX]}" >> "$FILE"

          git add "$FILE"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "${MESSAGES[$MSG_INDEX]} [daily-bot] (${TODAY})"
          git push
