name: Daily Random Commit (WIB)

on:
  schedule:
    # 8 slot sehari yang kira-kira pas WIB pagi-sore-malam
    - cron: "02 2 * * *"   # 09:02 WIB
    - cron: "30 4 * * *"   # 11:30 WIB
    - cron: "15 7 * * *"   # 14:15 WIB
    - cron: "45 9 * * *"   # 16:45 WIB
    - cron: "20 12 * * *"  # 19:20 WIB
    - cron: "50 14 * * *"  # 21:50 WIB
    - cron: "10 17 * * *"  # 00:10 WIB (malam)
    - cron: "40 19 * * *"  # 02:40 WIB (malam)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Maybe commit today
        shell: bash
        run: |
          set -e

          TODAY=$(date +%F)
          FILE="heartbeat.md"

          # Jika sudah ada commit hari ini, skip
          if git log --since="${TODAY} 00:00:00" --until="${TODAY} 23:59:59" --grep="chore: daily update ${TODAY}" --oneline | grep -q .; then
            echo "Already committed today. Skipping."
            exit 0
          fi

          # Random gate: hanya sebagian run yang commit
          HOUR=$(date +%H)
          MIN=$(date +%M)
          DAY=$(date +%d)

          DICE=$(( (HOUR*7 + MIN + DAY) % 4 ))

          if [ "$DICE" -ne 0 ]; then
            echo "Not selected this run. Skipping."
            exit 0
          fi

          # Append timestamp ke file
          echo "- ${TODAY} $(date '+%H:%M:%S WIB')" >> "$FILE"

          git add "$FILE"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: daily update ${TODAY}"
          git push
